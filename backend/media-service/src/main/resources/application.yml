server:
  port: 8083

spring:
  application:
    name: media-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/media_db}
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  product-service-url: ${PRODUCT_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
