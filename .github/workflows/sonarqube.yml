name: SonarQube Quality Gate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sonarqube:
    name: Analyze code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start SonarQube with Docker
        run: |
          sudo sysctl -w vm.max_map_count=262144
          docker compose -f docker-compose.sonar.yml up -d

      - name: Configure SonarQube project
        run: |
          for i in $(seq 1 60); do
            status=$(curl -s --max-time 5 http://localhost:9000/api/system/status | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{try{process.stdout.write(JSON.parse(s).status || '')}catch(e){}})")
            if [ "$status" = "UP" ]; then
              break
            fi
            sleep 5
          done

          curl -s -f -u admin:admin -X POST \
            --data-urlencode login=admin \
            --data-urlencode previousPassword=admin \
            --data-urlencode password='SafeZoneCi123!' \
            http://localhost:9000/api/users/change_password >/dev/null

          curl -s -u admin:'SafeZoneCi123!' -X POST \
            --data-urlencode project=safe-zone-ecommerce \
            --data-urlencode 'name=Safe Zone E-Commerce Microservices' \
            http://localhost:9000/api/projects/create >/dev/null || true

          curl -s -u admin:'SafeZoneCi123!' -X POST \
            --data-urlencode 'name=Safe Zone Audit Gate' \
            http://localhost:9000/api/qualitygates/create >/dev/null || true

          curl -s -u admin:'SafeZoneCi123!' \
            'http://localhost:9000/api/qualitygates/show?name=Safe%20Zone%20Audit%20Gate' > /tmp/safe-zone-gate.json
          python3 -c "import json; data=json.load(open('/tmp/safe-zone-gate.json')); [print(c['id']) for c in data.get('conditions', []) if c.get('metric') == 'new_coverage']" > /tmp/safe-zone-coverage-conditions
          while read -r condition_id; do
            if [ -n "$condition_id" ]; then
              curl -s -u admin:'SafeZoneCi123!' -X POST \
                --data-urlencode "id=$condition_id" \
                http://localhost:9000/api/qualitygates/delete_condition >/dev/null || true
            fi
          done < /tmp/safe-zone-coverage-conditions

          add_condition() {
            curl -s -u admin:'SafeZoneCi123!' -X POST \
              --data-urlencode 'gateName=Safe Zone Audit Gate' \
              --data-urlencode "metric=$1" \
              --data-urlencode "op=$2" \
              --data-urlencode "error=$3" \
              http://localhost:9000/api/qualitygates/create_condition >/dev/null || true
          }
          add_condition new_vulnerabilities GT 0
          add_condition new_bugs GT 0
          add_condition new_security_rating GT 1
          add_condition new_reliability_rating GT 1
          add_condition new_maintainability_rating GT 1

          curl -s -u admin:'SafeZoneCi123!' -X POST \
            --data-urlencode projectKey=safe-zone-ecommerce \
            --data-urlencode 'gateName=Safe Zone Audit Gate' \
            http://localhost:9000/api/qualitygates/select >/dev/null

          token=$(curl -s -f -u admin:'SafeZoneCi123!' -X POST \
            --data-urlencode "name=safe-zone-ci-${GITHUB_RUN_ID}" \
            --data-urlencode type=PROJECT_ANALYSIS_TOKEN \
            --data-urlencode projectKey=safe-zone-ecommerce \
            http://localhost:9000/api/user_tokens/generate | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{const data=JSON.parse(s); if(!data.token) process.exit(1); process.stdout.write(data.token)})")

          echo "::add-mask::$token"
          echo "SONAR_TOKEN=$token" >> "$GITHUB_ENV"
          echo "SONAR_HOST_URL=http://localhost:9000" >> "$GITHUB_ENV"

      - name: Backend tests and coverage
        working-directory: backend
        run: mvn clean verify

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests and coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: SonarQube scan
        run: |
          docker run --rm --network host \
            -e SONAR_TOKEN="$SONAR_TOKEN" \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.host.url="$SONAR_HOST_URL"

      - name: SonarQube quality gate
        timeout-minutes: 10
        run: |
          test -f .scannerwork/report-task.txt
          ce_task_url=$(grep '^ceTaskUrl=' .scannerwork/report-task.txt | cut -d= -f2-)
          test -n "$ce_task_url"

          for attempt in $(seq 1 60); do
            task_response=$(curl -s -u "${SONAR_TOKEN}:" "$ce_task_url")
            task_status=$(printf '%s' "$task_response" | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{try{const data=JSON.parse(s); process.stdout.write(data.task && data.task.status ? data.task.status : '')}catch(e){}})")

            if [ "$task_status" = "SUCCESS" ]; then
              analysis_id=$(printf '%s' "$task_response" | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{const data=JSON.parse(s); process.stdout.write(data.task.analysisId || '')})")
              break
            fi

            if [ "$task_status" = "FAILED" ] || [ "$task_status" = "CANCELED" ]; then
              printf 'SonarQube analysis task ended with status %s\n' "$task_status"
              exit 1
            fi

            printf 'Waiting for SonarQube analysis task, attempt %s, status %s\n' "$attempt" "${task_status:-unknown}"
            sleep 5
          done

          test -n "${analysis_id:-}"
          gate_response=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${analysis_id}")
          gate_status=$(printf '%s' "$gate_response" | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{const data=JSON.parse(s); process.stdout.write(data.projectStatus.status || '')})")
          printf 'SonarQube quality gate: %s\n' "$gate_status"
          test "$gate_status" = "OK"
